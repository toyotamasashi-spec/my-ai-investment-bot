name: Investment AI Analysis

on:
  workflow_dispatch: # ボタン一つで手動実行できる設定
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜日の朝9時（日本時間）に自動実行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install google-generativeai
      - name: Run analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python main.py
